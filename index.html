<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEG 幸運拉霸機 (進階版)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- html2canvas -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        .dashed-border {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='12' ry='12' stroke='%23EAB308' stroke-width='2' stroke-dasharray='6%2c 14' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
        }
        
        /* 中獎彈跳動畫 */
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-short {
            animation: bounce-short 0.5s ease-in-out infinite;
        }

        /* 強化版：拉霸滾動殘影動畫 */
        @keyframes slot-scroll-fast {
            0% { transform: translateY(-15%); filter: blur(2px); opacity: 0.9; }
            25% { transform: translateY(0%); filter: blur(4px); opacity: 0.8; }
            50% { transform: translateY(15%); filter: blur(6px); opacity: 0.6; }
            75% { transform: translateY(0%); filter: blur(4px); opacity: 0.8; }
            100% { transform: translateY(-15%); filter: blur(2px); opacity: 0.9; }
        }
        .spinning-effect {
            animation: slot-scroll-fast 0.1s linear infinite; /* 極快速度循環 */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONS ---
        const Sparkles = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        );
        const Volume2 = ({ size }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        );
        const VolumeX = ({ size }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
        );
        const Download = ({ size }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        );
        const Upload = ({ size }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        );

        // 預設音效
        const AUDIO_SRC = "https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"; 

        // 預設資料
        const QUOTES = [
            { author: "葉中如", text: "分享才會找到夥伴。" },
            { author: "葉中如", text: "先求有再求好。" },
            { author: "葉中如", text: "電腦不會爆炸。" },
            { author: "葉中如", text: "我只能祝你幸福。" },
            { author: "葉中如", text: "截止日期誰記得誰痛苦。" },
            { author: "葉中如", text: "考到你滿意考到你放棄。" },
            { author: "葉中如", text: "放下人生才會開闊。" },
            { author: "葉中如", text: "你的學習歷程不是我的教學歷程。" },
            { author: "葉中如", text: "Simplicity is beauty." },
            { author: "葉中如", text: "大人做不到的，不要叫小孩做。" },
            { author: "葉中如", text: "網路跨越不了人的惰性。" },
            { author: "葉中如", text: "再嫌就沒有了。" },
            { author: "葉中如", text: "切記眼球管理和社會化的笑容。" },
            { author: "廖昭彥", text: "不分享是不道德的。" },
            { author: "廖昭彥", text: "改變會有風險但不改變風險會更大。" },
            { author: "蕭仕原", text: "感情回不到過去，但Google文件可以！" },
            { author: "蕭仕原", text: "Google的世界沒有語言隔閡，有隔閡的是跟你隔壁的同事。" },
            { author: "蕭仕原", text: "學好擴充與外掛，人生多幾個月壽命。" },
            { author: "蕭仕原", text: "Google不是開一扇窗，而是推倒一面牆。" },
            { author: "賴建宏", text: "哀怨沒有不見，只是透過Google工具陪我們渡過空虛寂寞的加班夜。" },
            { author: "李偉綾", text: "Google幫你找回被偷走的時間。" },
            { author: "GEG", text: "一個人走得快，一群人走得遠。" },
            { author: "GEG", text: "科技始終來自於人性，但人性常敗給惰性。" },
            { author: "GEG", text: "不要為了科技而科技，重點是教學目標。" },
            { author: "GEG", text: "教室裡的風景，由你決定。" },
            { author: "GEG", text: "教育無他，愛與榜樣而已...還有Google。" },
            { author: "GEG", text: "雲端漫步，快樂教學。" },
            { author: "GEG", text: "擁抱改變，創造未來。" },
            { author: "GEG", text: "與其詛咒黑暗，不如點亮一支蠟燭。" },
            { author: "GEG", text: "保持好奇心，是學習的最佳動力。" }
        ];

        function GEGSlotMachine() {
            const [name, setName] = useState("");
            // 儲存用戶上傳的圖片 Blob URL
            const [customImages, setCustomImages] = useState([]);
            
            // 預設顏色 (當還沒上傳圖片時顯示)
            const DEFAULT_COLORS = ["#4285F4", "#EA4335", "#FBBC05", "#34A853", "#673AB7"];
            
            const [reels, setReels] = useState([0, 1, 2]); 
            const [isSpinning, setIsSpinning] = useState(false);
            const [quote, setQuote] = useState(null);
            const [isMuted, setIsMuted] = useState(false);
            const [showJackpot, setShowJackpot] = useState(false);
            
            const audioRef = useRef(null);
            const ticketRef = useRef(null);
            const fileInputRef = useRef(null);

            // 初始化隨機金句
            useEffect(() => {
                setQuote(QUOTES[Math.floor(Math.random() * QUOTES.length)]);
            }, []);

            // 處理圖片上傳
            const handleFileUpload = (event) => {
                const files = Array.from(event.target.files);
                if (files.length === 0) return;

                // 建立暫時的 Blob URL 讓瀏覽器可以顯示
                const newImageUrls = files.map(file => URL.createObjectURL(file));
                
                // 如果之前有舊的 URL，記得釋放記憶體 (Optional but good practice)
                // customImages.forEach(url => URL.revokeObjectURL(url));

                setCustomImages(prev => [...prev, ...newImageUrls]);
                alert(`成功載入 ${newImageUrls.length} 張圖片！可以開始玩了！`);
            };

            // 取得目前的圖片來源 (若無上傳則回傳空陣列，render時會改用顏色)
            const currentImages = customImages.length > 0 ? customImages : DEFAULT_COLORS;

            const playSound = () => {
                if (audioRef.current && !isMuted) {
                    audioRef.current.currentTime = 0;
                    audioRef.current.play().catch(e => console.log("Audio play failed:", e));
                }
            };

            const handleSpin = () => {
                if (isSpinning) return;
                
                // 檢查是否已上傳圖片
                if (customImages.length === 0) {
                    alert("請先點擊「選取圖片檔案」按鈕，載入您的 GEG 貼紙圖片喔！");
                    // 稍微閃爍一下上傳按鈕提示用戶
                    if(fileInputRef.current) fileInputRef.current.parentElement.classList.add("animate-bounce");
                    setTimeout(() => {
                        if(fileInputRef.current) fileInputRef.current.parentElement.classList.remove("animate-bounce");
                    }, 1000);
                    return;
                }

                if (!name.trim()) {
                    alert("請先輸入您的大名，讓我們為您客製化幸運卡！");
                    return;
                }

                setIsSpinning(true);
                setShowJackpot(false);
                playSound();

                // 旋轉持續時間
                let duration = 2000; 
                let intervalTime = 80; 
                
                const interval = setInterval(() => {
                    setReels([
                        Math.floor(Math.random() * currentImages.length),
                        Math.floor(Math.random() * currentImages.length),
                        Math.floor(Math.random() * currentImages.length)
                    ]);
                }, intervalTime);

                setTimeout(() => {
                    clearInterval(interval);
                    
                    const finalReels = [
                        Math.floor(Math.random() * currentImages.length),
                        Math.floor(Math.random() * currentImages.length),
                        Math.floor(Math.random() * currentImages.length)
                    ];
                    
                    setReels(finalReels);
                    setQuote(QUOTES[Math.floor(Math.random() * QUOTES.length)]);
                    
                    // 判斷是否中大獎 (3個圖案相同)
                    if (finalReels[0] === finalReels[1] && finalReels[1] === finalReels[2]) {
                        setShowJackpot(true);
                    }

                    setIsSpinning(false);
                }, duration);
            };

            const handleDownload = async () => {
                if (!ticketRef.current) return;
                
                window.html2canvas(ticketRef.current, {
                    backgroundColor: "#ffffff",
                    scale: 2,
                    logging: false,
                    useCORS: true 
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `GEG_LuckyDraw_${name || 'Guest'}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-yellow-50 flex flex-col items-center py-8 px-4 font-sans text-gray-800">
                    <audio ref={audioRef} src={AUDIO_SRC} loop={false} />
                    
                    {/* Header */}
                    <header className="mb-8 text-center">
                        <div className="flex items-center justify-center gap-2 mb-2">
                            <Sparkles className="text-yellow-500 w-8 h-8 animate-pulse" />
                            <h1 className="text-3xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 via-red-500 to-yellow-500 pb-1">
                                Google for Education
                            </h1>
                            <Sparkles className="text-yellow-500 w-8 h-8 animate-pulse" />
                        </div>
                        <p className="text-xl text-gray-600 font-medium">幸運拉霸機 & 金句抽抽樂</p>
                    </header>

                    {/* Control Panel */}
                    <div className="w-full max-w-md bg-white rounded-xl shadow-lg p-4 mb-6 flex flex-col gap-4">
                        <div className="flex justify-between items-center border-b pb-2">
                            <span className="font-bold text-gray-500">參加者設定</span>
                            <button 
                                onClick={() => setIsMuted(!isMuted)}
                                className={`p-2 rounded-full transition-colors ${isMuted ? 'bg-gray-200 text-gray-500' : 'bg-green-100 text-green-600'}`}
                                title={isMuted ? "開啟音效" : "靜音"}
                            >
                                {isMuted ? <VolumeX size={20} /> : <Volume2 size={20} />}
                            </button>
                        </div>
                        
                        {/* 名字輸入 */}
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">請輸入您的大名</label>
                            <input
                                type="text"
                                value={name}
                                onChange={(e) => setName(e.target.value)}
                                placeholder="例如：熱血教師 小明"
                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                            />
                        </div>

                        {/* 上傳按鈕區 (新增部分) */}
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                設定拉霸圖片 ({customImages.length > 0 ? `已載入 ${customImages.length} 張` : "尚未載入"})
                            </label>
                            <div className="relative">
                                <input
                                    type="file"
                                    ref={fileInputRef}
                                    multiple
                                    accept="image/*"
                                    onChange={handleFileUpload}
                                    className="hidden"
                                    id="image-upload"
                                />
                                <label 
                                    htmlFor="image-upload"
                                    className="flex items-center justify-center gap-2 w-full py-3 px-4 border-2 border-dashed border-blue-300 rounded-lg cursor-pointer bg-blue-50 hover:bg-blue-100 text-blue-600 font-bold transition-all"
                                >
                                    <Upload size={20} />
                                    {customImages.length > 0 ? "更換/增加圖片" : "📂 選取圖片檔案 (需選5張)"}
                                </label>
                            </div>
                        </div>
                    </div>

                    {/* TICKET AREA */}
                    <div 
                        ref={ticketRef} 
                        className="w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-yellow-400 relative"
                    >
                        <div className="bg-blue-600 p-4 text-center">
                            <h2 className="text-white text-xl font-bold tracking-wider">GEG LUCKY DRAW</h2>
                        </div>

                        <div className="p-6 bg-gradient-to-b from-white to-gray-50 flex flex-col items-center">
                            
                            <div className="mb-6 text-center">
                                <p className="text-gray-500 text-sm mb-1">參加者</p>
                                <h3 className="text-2xl font-bold text-gray-800 min-h-[2rem]">
                                    {name || "等待輸入..."}
                                </h3>
                            </div>

                            {/* Slot Machine Display */}
                            <div className="flex gap-2 md:gap-4 mb-8 p-4 bg-gray-800 rounded-xl border-4 border-gray-700 shadow-inner w-full justify-center min-h-[140px] items-center">
                                {reels.map((itemIndex, i) => {
                                    const hasImages = customImages.length > 0;
                                    
                                    return (
                                        <div key={i} className="relative w-24 h-24 md:w-28 md:h-28 bg-white rounded-lg overflow-hidden flex items-center justify-center border-2 border-gray-600 shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]">
                                            {/* 遮罩效果 */}
                                            <div className="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/20 pointer-events-none z-10 rounded-lg"></div>
                                            
                                            {hasImages ? (
                                                <img 
                                                    src={currentImages[itemIndex % currentImages.length]} 
                                                    alt="icon" 
                                                    className={`
                                                        w-full h-full object-contain p-1 
                                                        ${isSpinning ? 'spinning-effect' : ''}
                                                    `}
                                                />
                                            ) : (
                                                /* 預設狀態 (顯示色塊與問號) */
                                                <div 
                                                    className={`w-full h-full flex items-center justify-center text-white font-bold text-4xl ${isSpinning ? 'spinning-effect' : ''}`}
                                                    style={{ backgroundColor: DEFAULT_COLORS[itemIndex % DEFAULT_COLORS.length] }}
                                                >
                                                    ?
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Result Area */}
                            <div className="w-full text-center min-h-[120px] flex flex-col justify-center items-center p-4 bg-yellow-50 rounded-xl border border-yellow-200 dashed-border relative">
                                
                                {showJackpot && (
                                    <div className="absolute -top-4 -right-4 bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold animate-bounce-short shadow-lg z-10">
                                        🎉 中大獎啦！
                                    </div>
                                )}
                                
                                <p className="text-xs text-yellow-700 uppercase tracking-widest font-bold mb-2">Google For Education 每日金句</p>
                                {quote && (
                                    <>
                                        <p className="text-lg md:text-xl font-bold text-gray-800 leading-relaxed mb-2 transition-opacity duration-500">
                                            「{quote.text}」
                                        </p>
                                        <p className="text-sm text-gray-500 font-medium">—— {quote.author}</p>
                                    </>
                                )}
                            </div>
                            
                            <div className="mt-4 text-[10px] text-gray-400">
                                Generated by GEG Event Helper
                            </div>
                        </div>
                    </div>

                    {/* Action Buttons */}
                    <div className="mt-8 w-full max-w-md flex flex-col gap-4">
                        <button
                            onClick={handleSpin}
                            className={`
                                w-full py-4 px-6 rounded-2xl text-xl font-bold text-white shadow-[0_6px_0_rgb(0,0,0,0.2)] transition-all transform active:translate-y-[6px] active:shadow-none
                                ${isSpinning 
                                    ? 'bg-gray-400 cursor-not-allowed translate-y-[6px] shadow-none' 
                                    : 'bg-red-500 hover:bg-red-600'
                                }
                            `}
                        >
                            {isSpinning ? "運算中..." : "電腦不會爆炸，安心按下去"}
                        </button>

                        <button
                            onClick={handleDownload}
                            disabled={isSpinning || !name}
                            className="flex items-center justify-center gap-2 w-full py-3 px-6 rounded-xl font-bold text-blue-600 bg-white border-2 border-blue-100 hover:bg-blue-50 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            <Download size={20} />
                            下載我的幸運結果
                        </button>
                    </div>

                    <footer className="mt-12 text-center text-gray-400 text-sm">
                        <p>© 2024 GEG 研習互動專用</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GEGSlotMachine />);
    </script>
</body>
</html>
