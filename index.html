<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 安全防護：防止搜尋引擎抓取與收錄 -->
    <meta name="robots" content="noindex, nofollow">
    <title>GEG 幸運拉霸機 (活動專屬版)</title>
    
    <!-- 將所有外部套件改用全球最穩定的 cdnjs，避免因伺服器掛點導致畫面空白 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.2/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .dashed-border {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='12' ry='12' stroke='%23EAB308' stroke-width='2' stroke-dasharray='6%2c 14' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
        }
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.1); }
        }
        .animate-bounce-short { animation: bounce-short 0.5s ease-in-out infinite; }
        
        @keyframes slot-rolling {
            0% { transform: translateY(-30%); filter: blur(2px); opacity: 0.8; }
            50% { transform: translateY(30%); filter: blur(4px); opacity: 0.6; }
            100% { transform: translateY(-30%); filter: blur(2px); opacity: 0.8; }
        }
        .spinning-effect { animation: slot-rolling 0.08s linear infinite; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-yellow-50 min-h-screen text-gray-800">
    
    <!-- 加入載入中提示：如果套件載入較慢，就不會只有一片空白 -->
    <div id="root">
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh;">
            <h2 style="font-size: 24px; font-weight: bold; color: #4B5563;">網頁載入中，請稍候...</h2>
            <p style="color: #9CA3AF; margin-top: 10px;">如果長時間停留在本畫面，請檢查網路連線或重新整理。</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const INITIAL_QUOTES = [
            "分享才會找到夥伴。 —— 葉中如",
            "先求有再求好。 —— 葉中如",
            "電腦不會爆炸。 —— 葉中如",
            "截止日期誰記得誰痛苦。 —— 葉中如",
            "不分享是不道德的。 —— 廖昭彥",
            "感情回不到過去，但Google文件可以！ —— 蕭仕原",
            "Google的世界沒有語言隔閡，有隔閡的是跟你隔壁的同事。 —— 蕭仕原",
            "一個人走得快，一群人走得遠。 —— GEG",
            "科技始終來自於人性，但人性常敗給惰性。 —— GEG"
        ];
        const DEFAULT_COLORS = ["#4285F4", "#EA4335", "#FBBC05", "#34A853", "#673AB7"];
        const AUDIO_SRC = "https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"; 

        function GEGSlotMachineApp() {
            // --- 狀態管理 ---
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [passcode, setPasscode] = useState("GEG2024");
            const [loginInput, setLoginInput] = useState("");

            const [name, setName] = useState("");
            const [customImages, setCustomImages] = useState([]);
            const [quotes, setQuotes] = useState(INITIAL_QUOTES);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);

            const [reels, setReels] = useState([0, 1, 2]);
            const [isSpinning, setIsSpinning] = useState(false);
            const [currentQuote, setCurrentQuote] = useState(null);
            const [showJackpot, setShowJackpot] = useState(false);
            const [toastMsg, setToastMsg] = useState("");

            const audioRef = useRef(null);
            const ticketRef = useRef(null);

            // --- 輔助通知框 ---
            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(""), 3000);
            };

            // 初始化隨機金句
            useEffect(() => {
                if (!currentQuote && quotes.length > 0) {
                    setCurrentQuote(quotes[Math.floor(Math.random() * quotes.length)]);
                }
            }, []);

            // --- 事件處理邏輯 ---
            const handleLogin = (e) => {
                e.preventDefault();
                if (loginInput === passcode) {
                    setIsAuthenticated(true);
                } else {
                    showToast("❌ 通關密碼錯誤，請重新輸入");
                    setLoginInput("");
                }
            };

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                const newUrls = files.map(file => URL.createObjectURL(file));
                setCustomImages(prev => [...prev, ...newUrls]);
                showToast("✅ 圖片上傳成功！");
            };

            const removeImage = (indexToRemove) => {
                URL.revokeObjectURL(customImages[indexToRemove]); // 確實釋放記憶體
                setCustomImages(prev => prev.filter((_, idx) => idx !== indexToRemove));
            };

            const handleSpin = () => {
                if (customImages.length < 3) {
                    showToast("⚠️ 圖片數量不足！請點擊右上角設定，上傳至少 3 張圖片。");
                    return;
                }
                if (!name.trim()) {
                    showToast("⚠️ 請先輸入您的大名！");
                    return;
                }
                if (isSpinning) return;

                setIsSpinning(true);
                setShowJackpot(false);

                if (audioRef.current) {
                    audioRef.current.currentTime = 0;
                    audioRef.current.play().catch(e => console.log(e));
                }

                const spinInterval = setInterval(() => {
                    setReels([
                        Math.floor(Math.random() * customImages.length),
                        Math.floor(Math.random() * customImages.length),
                        Math.floor(Math.random() * customImages.length)
                    ]);
                }, 80);

                setTimeout(() => {
                    clearInterval(spinInterval);
                    const finalReels = [
                        Math.floor(Math.random() * customImages.length),
                        Math.floor(Math.random() * customImages.length),
                        Math.floor(Math.random() * customImages.length)
                    ];
                    setReels(finalReels);

                    if (quotes.length > 0) {
                        setCurrentQuote(quotes[Math.floor(Math.random() * quotes.length)]);
                    }

                    if (finalReels[0] === finalReels[1] && finalReels[1] === finalReels[2]) {
                        setShowJackpot(true);
                        // 防呆確認套件有載入才放碎紙花
                        if (typeof window.confetti === 'function') {
                            window.confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        }
                    }
                    setIsSpinning(false);
                }, 2000);
            };

            const handleDownload = () => {
                if (!ticketRef.current) return;
                showToast("⏳ 正在為您打包票根...");
                window.html2canvas(ticketRef.current, { backgroundColor: "#ffffff", scale: 2, useCORS: true }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `活動幸運票根_${name || 'Guest'}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }).catch(err => {
                    console.error(err);
                    showToast("❌ 下載發生錯誤，請稍後再試。");
                });
            };

            // --- 畫面渲染 ---
            return (
                <div className="relative min-h-screen">
                    {/* Toast 提示框 */}
                    {toastMsg && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] bg-gray-900 text-white px-6 py-3 rounded-full shadow-xl font-bold transition-all">
                            {toastMsg}
                        </div>
                    )}

                    {!isAuthenticated ? (
                        /* ================== 密碼鎖畫面 ================== */
                        <div className="flex items-center justify-center min-h-screen p-4">
                            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center border-t-8 border-blue-500">
                                <div className="text-4xl mb-4">🔒</div>
                                <h2 className="text-2xl font-bold text-gray-800 mb-2">活動專屬拉霸機</h2>
                                <p className="text-gray-500 text-sm mb-6">為保護活動內容，請輸入通關密碼</p>
                                <form onSubmit={handleLogin}>
                                    <input
                                        type="password"
                                        value={loginInput}
                                        onChange={(e) => setLoginInput(e.target.value)}
                                        className="w-full px-4 py-3 mb-4 bg-gray-50 border border-gray-300 rounded-lg text-center tracking-widest text-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        placeholder="輸入密碼..."
                                    />
                                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow">
                                        解鎖進入
                                    </button>
                                </form>
                            </div>
                        </div>
                    ) : (
                        /* ================== 主遊戲畫面 ================== */
                        <div className="flex flex-col items-center py-8 px-4">
                            <audio ref={audioRef} src={AUDIO_SRC} />

                            {/* 右上角設定按鈕 */}
                            <button 
                                onClick={() => setIsSettingsOpen(true)} 
                                className="absolute top-4 right-4 bg-white/60 hover:bg-white px-4 py-2 rounded-full shadow text-gray-700 font-bold transition-all"
                            >
                                ⚙️ 設定
                            </button>

                            {/* 設定控制台 (Modal) */}
                            {isSettingsOpen && (
                                <div className="fixed inset-0 bg-black/60 flex justify-center items-center z-50 p-4 backdrop-blur-sm">
                                    <div className="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] flex flex-col overflow-hidden shadow-2xl">
                                        <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                                            <h3 className="font-bold text-lg text-gray-800">⚙️ 拉霸機後台設定</h3>
                                            <button onClick={() => setIsSettingsOpen(false)} className="text-gray-500 hover:text-gray-800 font-bold text-xl">✕</button>
                                        </div>
                                        <div className="p-6 overflow-y-auto flex-1 flex flex-col gap-6">
                                            <section>
                                                <h4 className="font-bold mb-1 text-gray-800">🖼️ 圖片管理 (目前: <span className={customImages.length < 3 ? 'text-red-500' : 'text-green-600'}>{customImages.length}</span> 張)</h4>
                                                <p className="text-xs text-gray-500 mb-3">請上傳至少 3 張圖片，點擊圖片右上角可刪除。</p>
                                                <input type="file" multiple accept="image/*" onChange={handleFileUpload} className="mb-4 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer" />
                                                <div className="grid grid-cols-4 gap-2">
                                                    {customImages.map((src, idx) => (
                                                        <div key={idx} className="relative aspect-square bg-gray-100 rounded-lg border">
                                                            <img src={src} className="w-full h-full object-cover p-1 rounded-lg" alt="preview" />
                                                            <button onClick={() => removeImage(idx)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs shadow-md hover:bg-red-600">✕</button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </section>
                                            <section>
                                                <h4 className="font-bold mb-1 text-gray-800">📝 金句管理 (一行一句)</h4>
                                                <textarea
                                                    className="w-full h-32 p-3 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"
                                                    value={quotes.join('\n')}
                                                    onChange={(e) => setQuotes(e.target.value.split('\n').filter(q => q.trim() !== ''))}
                                                />
                                            </section>
                                            <section>
                                                <h4 className="font-bold mb-1 text-gray-800">🔐 變更通關密碼</h4>
                                                <input
                                                    type="text"
                                                    value={passcode}
                                                    onChange={(e) => setPasscode(e.target.value)}
                                                    className="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 tracking-widest font-bold"
                                                />
                                            </section>
                                        </div>
                                        <div className="p-4 border-t text-right bg-gray-50">
                                            <button onClick={() => setIsSettingsOpen(false)} className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded-lg font-bold shadow">完成設定</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 標題與輸入框 */}
                            <h1 className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-red-500 mb-8 mt-4 tracking-wider py-2">
                                幸運拉霸機
                            </h1>
                            <div className="w-full max-w-md mb-6">
                                <input
                                    type="text"
                                    value={name}
                                    onChange={(e) => setName(e.target.value)}
                                    placeholder="👉 請先輸入您的大名..."
                                    className="w-full px-6 py-4 text-center text-xl bg-white rounded-xl shadow-md border-2 border-transparent focus:border-blue-400 focus:outline-none font-bold text-gray-700"
                                />
                            </div>

                            {/* 票根顯示區 */}
                            <div ref={ticketRef} className="w-full max-w-lg bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-yellow-400 relative">
                                <div className="bg-blue-600 p-3 text-center text-white font-bold tracking-widest uppercase text-sm">Lucky Draw Ticket</div>
                                <div className="p-6 bg-gradient-to-b from-white to-gray-50 flex flex-col items-center">
                                    <div className="mb-6 text-center w-full border-b-2 border-dashed border-gray-200 pb-4">
                                        <p className="text-gray-400 text-sm mb-1 font-bold uppercase">Participant</p>
                                        <h3 className="text-3xl font-black text-gray-800 min-h-[2.5rem]">{name || "等待輸入..."}</h3>
                                    </div>

                                    {/* 拉霸視窗 */}
                                    <div className="flex gap-4 mb-6 p-5 bg-gray-800 rounded-2xl border-[6px] border-gray-700 shadow-inner w-full justify-center items-center">
                                        {reels.map((itemIndex, i) => {
                                            const hasImages = customImages.length > 0;
                                            const safeBgStyle = { backgroundColor: DEFAULT_COLORS[itemIndex % DEFAULT_COLORS.length] };
                                            return (
                                                <div key={i} className="relative w-24 h-24 md:w-28 md:h-28 bg-white rounded-xl overflow-hidden flex items-center justify-center shadow-inner">
                                                    {hasImages ? (
                                                        <img src={customImages[itemIndex % customImages.length]} className={`w-full h-full object-contain p-2 ${isSpinning ? 'spinning-effect' : ''}`} alt="icon" />
                                                    ) : (
                                                        <div className={`w-full h-full flex items-center justify-center text-white font-bold text-5xl ${isSpinning ? 'spinning-effect' : ''}`} style={safeBgStyle}>?</div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* 金句抽取區 */}
                                    <div className="w-full text-center p-5 bg-yellow-50 rounded-2xl border border-yellow-200 dashed-border relative min-h-[120px] flex flex-col justify-center">
                                        {showJackpot && <div className="absolute -top-4 right-1/2 translate-x-1/2 bg-red-500 text-white px-5 py-1 rounded-full text-sm font-black animate-bounce-short shadow-md border-2 border-white">🎉 中大獎啦 🎉</div>}
                                        <p className="text-xs text-yellow-600 font-bold mb-3 tracking-widest uppercase">今日幸運金句</p>
                                        <p className="text-xl font-bold text-gray-800 leading-relaxed">{currentQuote ? `「${currentQuote}」` : "準備抽出專屬金句..."}</p>
                                    </div>
                                </div>
                            </div>

                            {/* 操作按鈕 */}
                            <div className="mt-8 w-full max-w-md flex flex-col gap-4">
                                <button
                                    onClick={handleSpin}
                                    disabled={isSpinning}
                                    className={`w-full py-5 rounded-2xl text-2xl font-black text-white transition-all ${isSpinning ? 'bg-gray-400 translate-y-[4px]' : customImages.length < 3 ? 'bg-gray-300 shadow-[0_4px_0_#9ca3af]' : 'bg-red-500 hover:bg-red-600 shadow-[0_6px_0_#b91c1c] active:translate-y-[6px] active:shadow-none'}`}
                                >
                                    {isSpinning ? "運轉中..." : customImages.length < 3 ? "圖片不足，請先設定" : "🎰 點我拉霸！"}
                                </button>
                                <button onClick={handleDownload} disabled={isSpinning || !name} className="w-full py-4 rounded-xl font-bold text-blue-600 bg-white border-2 border-blue-100 hover:bg-blue-50 disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                                    📥 下載我的幸運結果
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GEGSlotMachineApp />);
    </script>
</body>
</html>
